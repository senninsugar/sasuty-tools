<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>proxy</title>
    <style>
        body { margin: 0; background: #0a0a0c; color: #fff; font-family: sans-serif; overflow: hidden; }
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: 1; opacity: 0.3; }
        #embed-frame { width: 100vw; height: 100vh; border: none; display: none; position: relative; z-index: 2; }
        
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 10; background: #0a0a0c;
        }
        .orb { width: 60px; height: 60px; background: #6366f1; border-radius: 50%; filter: blur(20px); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.5); } }
        #status { margin-top: 1rem; font-size: 0.8rem; color: #666; letter-spacing: 2px; }
        
        #error { display: none; text-align: center; color: #ff6b6b; padding: 20px; }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    
    <div id="overlay">
        <div class="orb"></div>
        <div id="status">準備中</div>
    </div>
    
    <div id="error"></div>
    <iframe id="embed-frame"></iframe>
    
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="/tools/proxy/sasutyproxy/uv/uv.bundle.js"></script>
    <script src="/tools/proxy/sasutyproxy/uv/uv.config.js"></script>
    <script type="module">
        import { registerSW } from "/tools/proxy/sasutyproxy/register-sw.mjs";
        import * as BareMux from "/tools/proxy/sasutyproxy/baremux/index.mjs";

        particlesJS('particles-js', { particles: { number: { value: 30 }, color: { value: '#6366f1' }, line_linked: { enable: true, opacity: 0.1 } } });

        const connection = new BareMux.BareMuxConnection("/tools/proxy/sasutyproxy/baremux/worker.js");
        const wispServers = ["wss://wisp.rhw.one/", "wss://anura.pro/", "wss://phantom.lol/wisp/", "wss://wisp.mercurywork.shop/", "wss://shadow-3.swanndvr.net/wisp/", "wss://shadow.curesoutpost.com/wisp/", "wss://wisp.43059.lrga.space/", "wss://wisp.lrga.space/", "wss://wisp.artclass-eta.vercel.app", "wss://wisp.gointerstellar.app/", "wss://wisp.webmc.fun/", "wss://construction.services.codd70.ru/socket/", "wss://tomp.app/wisp/"];

        let activeWispUrl = null;
        async function checkWispServer(url) {
            return new Promise((resolve) => {
                const ws = new WebSocket(url);
                const t = setTimeout(() => { ws.close(); resolve(false); }, 3000);
                ws.onopen = () => { clearTimeout(t); ws.close(); resolve(true); };
                ws.onerror = () => { clearTimeout(t); resolve(false); };
            });
        }

        async function getAvailableWisp() {
            if (activeWispUrl) return activeWispUrl;
            for (const url of wispServers) {
                document.getElementById('status').textContent = `CONNECTING: ${new URL(url).hostname}`;
                if (await checkWispServer(url)) return activeWispUrl = url;
            }
            throw new Error("Connection failed.");
        }

        function search(input) {
            try { return new URL(input).toString(); } catch (err) {}
            try { const url = new URL(`http://${input}`); if (url.hostname.includes(".")) return url.toString(); } catch (err) {}
            return "https://html.duckduckgo.com/html?q=" + encodeURIComponent(input);
        }

        async function getUV(input) {
            await registerSW();
            const wispUrl = await getAvailableWisp();
            if ((await connection.getTransport()) !== "/tools/proxy/sasutyproxy/epoxy/index.mjs") {
                await connection.setTransport("/tools/proxy/sasutyproxy/epoxy/index.mjs", [{ wisp: wispUrl }]);
            }
            return __uv$config.prefix + __uv$config.encodeUrl(search(input));
        }

        async function embedUrl() {
            const url = window.location.hash.substring(1);
            if (!url) return;
            try {
                const proxiedUrl = await getUV(decodeURIComponent(url));
                const iframe = document.getElementById('embed-frame');
                iframe.onload = () => { document.getElementById('overlay').style.display = 'none'; iframe.style.display = 'block'; };
                iframe.src = proxiedUrl;
            } catch (e) { document.getElementById('error').textContent = e.message; document.getElementById('error').style.display = 'block'; }
        }

        window.addEventListener('hashchange', embedUrl);
        const init = () => { if (typeof __uv$config !== 'undefined') embedUrl(); else setTimeout(init, 10); };
        window.addEventListener('load', init);
    </script>
</body>
</html>
